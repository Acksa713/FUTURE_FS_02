<!DOCTYPE html>
<html>

<head>

  <title>Mini CRM Login</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <h2>Mini CRM Admin Login</h2>

  <input
    type="email"
    id="email"
    placeholder="Enter Email"
  >

  <input
    type="password"
    id="password"
    placeholder="Enter Password"
  >

  <button onclick="login()">
    Login
  </button>

</div>

<script src="app.js"></script>

</body>
</html>
